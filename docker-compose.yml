version: "3.8"
services:
  db:
    image: postgres:14
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "${DB_HOST_PORT:-5432}:5432"

  server:
    build: ./server
    command: npm run start:dev
    volumes:
      - ./server:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      NODE_ENV: ${NODE_ENV}
      NODE_PORT: ${NODE_PORT}
      FILE_PATH: /usr/src/app/src
      DB_HOST: db
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      CLIENT_HOST: ${CLIENT_HOST}
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "3000:3000"

  client:
    build: ./client
    command: npm run dev
    volumes:
      - ./client:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      PORT: ${CLIENT_PORT}
      HOST: ${HOST}
    env_file:
      - .env
      - ./client/.env
    depends_on:
      - server
    ports:
      - "9000:9000"

volumes:
  db-data:
